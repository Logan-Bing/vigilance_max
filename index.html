<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link href="/src/styles/style.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>vigilance-max</title>
</head>

<body>
  <div id="app">
  </div>
  <script type="module" src="/src/router.js"></script>
  <!-- TEMPLATE -->
  <template id="benefits">
    <div class="container flex flex-col text-center gap-8 xl:gap-16">
      <h2>Pourquoi nous <span class="text-500-primary">choisir ?</span></h2>
      <div class="flex flex-wrap justify-center items-center gap-8 gap-y-8 text-center xl:justify-between">
        <div class="flex flex-col gap-4 items-center xl:gap-8 xl:max-w-64">
          <img class="w-16 h-16" src="./public/icons/icon/benefits.png" alt="">
          <p>Prestations adaptées aux besoins des clients</p>
        </div>
        <div class="flex flex-col gap-4 items-center xl:gap-8 xl:max-w-64">
          <img class="w-16 h-16" src="./public/icons/icon/surveillance.png" alt="">
          <p>Prestations adaptées aux besoins des clients</p>
        </div>
        <div class="flex flex-col gap-4 items-center xl:gap-8 xl:max-w-64">
          <img class="w-16 h-16" src="./public/icons/icon/pro.png" alt="">
          <p>Prestations adaptées aux besoins des clients</p>
        </div>
        <div class="flex flex-col gap-4 items-center xl:gap-8 xl:max-w-64">
          <img class="w-16 h-16" src="./public/icons/icon/fast.png" alt="">
          <p>Prestations adaptées aux besoins des clients</p>
        </div>
      </div>
    </div>
  </template>
  <template id="header-template">
    <div class="relative">
      <header
        class="container w-full z-20 absolute left-0 right-0 flex items-center justify-center pt-8 xl:justify-between">
        <a href="/">
          <img src="./public/logos/fulllogo_transparent_nobuffer.png" class="w-14 cursor-pointer xl:w-25" alt="logo">
        </a>
        <nav
          class="hidden xl:flex items-center gap-16 font-semibold text-base-white font-urbanist font-semibold tracking-[1px]">
          <ul class="flex gap-16">
            <li class="subnav cursor-pointer relative">
              <div class="flex gap-2">
                <a
                  class="hover:underline underline-offset-4 decoration-transparent hover:decoration-current transition-all duration-300 ease-out ">Gardiennage
                  Humain</a>
                <img src="./public/icons/icon/Group.svg" alt="icone fleche" class="">
              </div>
              <ul class="subnav-wrapper bg-white-bg text-base-grey mt-2 p-4 flex flex-col gap-4 absolute hidden">
                <li><a href="/agent_cynophile"
                    class="hover:underline underline-offset-4 decoration-transparent hover:decoration-current transition-all duration-300 ease-out">Agent
                    cynophile</a></li>
                <li><a href="/agent_rondier"
                    class="hover:underline underline-offset-4 decoration-transparent hover:decoration-current transition-all duration-300 ease-out">Agent
                    rondier</a></li>
                <li><a href="/agent_ssiap"
                    class="hover:underline underline-offset-4 decoration-transparent hover:decoration-current transition-all duration-300 ease-out">Agent
                    SSIAP</a></li>
                <li><a href="/agent_intervention"
                    class="hover:underline underline-offset-4 decoration-transparent hover:decoration-current transition-all duration-300 ease-out">Agent
                    intervention</a></li>
              </ul>
            </li>
            <li><a href="/Contact"
                class="hover:underline underline-offset-4 decoration-transparent hover:decoration-current transition-all duration-300 ease-out">Contact</a>
            </li>
          </ul>
          <button class="btn-primary flex gap-2 font-urbanist">
            Devis
            <img src="./public/icons/icon/Vector.svg" alt="icone mail">
          </button>
        </nav>

        <!-- BURGER ICON MENU -->
        <div class="flex flex-col absolute right-4 justify-between w-6 h-5 cursor-pointer burger-btn xl:hidden">
          <span class="block h-0.5 bg-500-primary transition-all"></span>
          <span class="block h-0.5 bg-500-primary transition-all"></span>
          <span class="block h-0.5 bg-500-primary transition-all"></span>
        </div>
      </header>
    </div>
    <!-- MOBILE NAV -->
    <div
      class="mobile-nav fixed z-10 inset-0 bg-base-black text-base-white translate-x-full transition-transform duration-300 xl:hidden">
      <nav class="h-full flex flex-col items-center justify-center text-center px-6">
        <div class="flex flex-col gap-6">
          <span class="text-3xl text-base-grey">gardiennage humain</span>

          <ul class="flex flex-col gap-3 text-2xl font-urbanist">
            <li><a href="/agent_rondier">agent rondier</a></li>
            <li><a href="/agent_intervention">agent d'intervention</a></li>
            <li><a href="/agent_ssiap">agent ssiap</a></li>
            <li><a href="/agent_cynophile">agent cynophile</a></li>
          </ul>
        </div>

        <a href="/contact" class="mt-16 text-3xl">contact</a>
      </nav>
    </div>
  </template>
  <template id="footer-template">
    <footer class="bg-base-black mt-32">
      <div class="max-w-[1440px] mx-auto px-6 py-10 sm:px-10 lg:px-[120px] lg:py-[64px]">
        <div class="flex flex-col items-center gap-10 lg:flex-row lg:items-center lg:gap-[135px]">

          <!-- Logo -->
          <div class="w-[180px] sm:w-[220px] lg:w-[296px] shrink-0">
            <img src="https://www.figma.com/api/mcp/asset/2762a944-117d-4e99-83c0-fee354365f4c" alt="Vigilance Max"
              class="w-full h-auto object-contain" />
          </div>

          <!-- Colonnes -->
          <div class="w-full grid grid-cols-1 gap-10 sm:grid-cols-3 sm:gap-8">

            <!-- Sections -->
            <div class="flex flex-col gap-8">
              <h3 class="font-urbanist font-medium text-white text-2xl tracking-[0.02em]">Sections</h3>
              <ul class="flex flex-col gap-4 font-montserrat font-normal text-white text-base">
                <li><a href="#" class="hover:text-primary transition-colors">Accueil</a></li>
                <li><a href="#" class="hover:text-primary transition-colors">Agent cynophile</a></li>
                <li><a href="#" class="hover:text-primary transition-colors">Agent rondier</a></li>
                <li><a href="#" class="hover:text-primary transition-colors">Agent SSIAP</a></li>
                <li><a href="#" class="hover:text-primary transition-colors">Agent d'intervention</a></li>
              </ul>
            </div>

            <!-- Contact -->
            <div class="flex flex-col gap-8">
              <h3 class="font-urbanist font-medium text-white text-2xl tracking-[0.02em]">Contact</h3>
              <ul class="flex flex-col gap-4 font-montserrat text-base">
                <li class="text-white">+33 01 02 03 04 05</li>
                <li><a href="mailto:contact@gmail.com"
                    class="font-bold text-primary hover:opacity-80 transition-opacity">contact@gmail.com</a></li>
                <li><a href="#" class="font-bold text-primary hover:opacity-80 transition-opacity">Contact</a></li>
              </ul>
            </div>

            <!-- Adresse -->
            <div class="flex flex-col gap-8">
              <h3 class="font-urbanist font-medium text-white text-2xl tracking-[0.02em]">Adresse</h3>
              <ul class="flex flex-col gap-4 font-montserrat text-base">
                <li class="text-white">Nazar</li>
                <li><a href="#" class="font-bold text-primary hover:opacity-80 transition-opacity">Contact</a></li>
              </ul>
            </div>

          </div>
        </div>
      </div>
    </footer>
  </template>
  <template id="form-template">
    <section class="container px-6 py-12 bg-white shadow-custom sm:px-10 lg:px-[120px] lg:py-[64px]">

      <!-- Titre -->
      <h2 class="font-urbanist font-semibold text-center text-[#212324] text-2xl sm:text-3xl mb-10">
        Parlez nous de votre <span class="text-500-primary">projet</span>
      </h2>

      <!-- Formulaire -->
      <form class="max-w-[740px] mx-auto flex flex-col gap-6">

        <!-- Ligne 1 : Prénom + Entreprise -->
        <div class="flex flex-col gap-6 sm:flex-row sm:gap-4">
          <div class="flex flex-col gap-2 w-full">
            <label class="font-montserrat text-sm text-[#212324]">Prénom</label>
            <input type="text" placeholder="Jean"
              class="w-full border border-gray-300 rounded-2xl px-4 py-3 font-montserrat text-sm text-base-black placeholder-gray-400 outline-none focus:border-primary transition-colors" />
          </div>
          <div class="flex flex-col gap-2 w-full">
            <label class="font-montserrat text-sm text-[#212324]">Entreprise</label>
            <input type="text" placeholder="Total energie"
              class="w-full border border-gray-300 rounded-2xl px-4 py-3 font-montserrat text-sm text-base-black placeholder-gray-400 outline-none focus:border-primary transition-colors" />
          </div>
        </div>

        <!-- Ligne 2 : Email + Téléphone -->
        <div class="flex flex-col gap-6 sm:flex-row sm:gap-4">
          <div class="flex flex-col gap-2 w-full">
            <label class="font-montserrat text-sm text-[#212324]">Email</label>
            <input type="email" placeholder="contact@gmail.com"
              class="w-full border border-gray-300 rounded-2xl px-4 py-3 font-montserrat text-sm text-base-black placeholder-gray-400 outline-none focus:border-primary transition-colors" />
          </div>
          <div class="flex flex-col gap-2 w-full">
            <label class="font-montserrat text-sm text-[#212324]">Numéro de téléphone</label>
            <input type="tel" placeholder="01020305"
              class="w-full border border-gray-300 rounded-2xl px-4 py-3 font-montserrat text-sm text-base-black placeholder-gray-400 outline-none focus:border-primary transition-colors" />
          </div>
        </div>

        <!-- Message -->
        <div class="flex flex-col gap-2 items-center">
          <div class="w-full sm:w-[360px] flex flex-col gap-2">
            <label class="font-montserrat text-sm text-[#212324]">Message</label>
            <textarea placeholder="message" rows="5"
              class="w-full border border-gray-300 rounded-2xl px-4 py-3 font-montserrat text-sm text-base-black placeholder-gray-400 outline-none focus:border-primary transition-colors resize-none"></textarea>
          </div>
        </div>

        <!-- Bouton -->
        <div class="flex justify-center">
          <button type="submit" class="btn-primary">
            Envoyer
          </button>
        </div>

      </form>

    </section>
  </template>
</body>

</html>
